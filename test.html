<!DOCTYPE html>
<html>
<head>
    <title>Mock and Wait Test</title>
</head>
<body>
    <button id="mock-btn">Mock Fetch</button>
    <div id="mock-result"></div>

    <button id="slow-btn">Slow Fetch</button>
    <div id="slow-result"></div>

    <script>
        document.getElementById('mock-btn').addEventListener('click', () => {
            document.getElementById('mock-result').innerText = 'fetching mock...';
            fetch('api/data')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('mock-result').innerText = JSON.stringify(data);
                })
                .catch(err => {
                    document.getElementById('mock-result').innerText = 'error: ' + err.message;
                });
        });

        document.getElementById('slow-btn').addEventListener('click', () => {
            document.getElementById('slow-result').innerText = 'fetching slow...';
            fetch('https://httpbin.org/delay/2')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('slow-result').innerText = 'slow done';
                })
                .catch(err => {
                    document.getElementById('slow-result').innerText = 'error: ' + err.message;
                });
        });
    </script>
</body>
</html>
